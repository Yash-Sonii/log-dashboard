name: Docker Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t log-dashboard:${{ github.sha }} .

      - name: Run container and check health
        run: |
          docker run -d -p 5000:5000 --name test log-dashboard:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/health
